# Pip configuration template for Artifactory
# This file will be dynamically configured with credentials from Azure Key Vault
# Placeholders will be replaced at runtime:
# - ARTIFACTORY_BASE_URL: Base URL of Artifactory instance
# - ARTIFACTORY_PYPI_REPO: Name of PyPI repository
# - ARTIFACTORY_USERNAME: Username from Key Vault
# - ARTIFACTORY_PASSWORD: Password from Key Vault

[global]
# This will be replaced with actual credentials at runtime
index-url = https://<USER>:<TOKEN>@<ARTIFACTORY_HOST>/artifactory/api/pypi/<REPO_NAME>/simple
trusted-host = ${ARTIFACTORY_HOST}


